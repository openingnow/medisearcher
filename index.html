  <style>
    .tooltip {
      position: relative;
    }

    .tooltiptext {
      visibility: hidden;
      white-space: nowrap;
      border-style: solid;
      border-width: 1px;
      background-color: white;

      /* Position the tooltip */
      position: absolute;
      z-index: 1;
      top: 70%;
      left: 30%;
      transition-property: visibility;
      transition-delay: 0s;
    }

    .tooltip:hover .tooltiptext {
      visibility: visible;
    }
  </style>
</head>
